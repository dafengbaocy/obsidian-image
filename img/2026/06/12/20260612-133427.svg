<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420">
<style>text{font-family:'WenQuanYi Zen Hei','DejaVu Sans',sans-serif}</style>
<defs><marker id="a" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#555"/></marker></defs>
<rect x="10" y="5" width="100" height="22" rx="3" fill="#e8f5e9" stroke="#2e7d32"/><text x="60" y="20" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">协程(业务)</text>
<line x1="60" y1="27" x2="60" y2="400" stroke="#ccc" stroke-dasharray="3,3"/>
<rect x="150" y="5" width="120" height="22" rx="3" fill="#e3f2fd" stroke="#1565c0"/><text x="210" y="20" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">UThreadScheduler</text>
<line x1="210" y1="27" x2="210" y2="400" stroke="#ccc" stroke-dasharray="3,3"/>
<rect x="330" y="5" width="100" height="22" rx="3" fill="#f3e5f5" stroke="#7b1fa2"/><text x="380" y="20" text-anchor="middle" font-size="9" font-weight="bold" fill="#7b1fa2">epoll/Kernel</text>
<line x1="380" y1="27" x2="380" y2="400" stroke="#ccc" stroke-dasharray="3,3"/>
<text x="70" y="55" font-size="8" fill="#2e7d32">UThreadRead()</text>
<line x1="60" y1="62" x2="207" y2="62" stroke="#2e7d32" stroke-width="1" marker-end="url(#a)"/>
<text x="130" y="57" font-size="7" fill="#555">1.UThreadPoll()</text>
<rect x="160" y="75" width="100" height="36" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="0.8"/><text x="210" y="90" text-anchor="middle" font-size="7" fill="#1565c0">注册epoll+定时器</text><text x="210" y="103" text-anchor="middle" font-size="7" fill="#555">记录uthread_id</text>
<line x1="260" y1="93" x2="377" y2="93" stroke="#1565c0" stroke-width="0.8" marker-end="url(#a)"/><text x="318" y="88" font-size="7" fill="#7b1fa2">epoll_ctl</text>
<text x="220" y="129" font-size="7" fill="#c62828">2.YieldTask()</text>
<rect x="165" y="137" width="90" height="28" rx="3" fill="#ffebee" stroke="#c62828" stroke-width="0.8"/><text x="210" y="156" text-anchor="middle" font-size="8" fill="#c62828">swapcontext</text>
<rect x="165" y="177" width="90" height="28" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="0.8"/><text x="210" y="196" text-anchor="middle" font-size="8" fill="#1565c0">epoll_wait()</text>
<line x1="380" y1="210" x2="213" y2="210" stroke="#7b1fa2" stroke-width="0.8" marker-end="url(#a)"/><text x="295" y="205" font-size="7" fill="#7b1fa2">数据到达</text>
<rect x="165" y="223" width="90" height="28" rx="3" fill="#ede7f6" stroke="#4527a0" stroke-width="0.8"/><text x="210" y="242" text-anchor="middle" font-size="8" fill="#4527a0">Resume(id)</text>
<line x1="213" y1="270" x2="63" y2="270" stroke="#2e7d32" stroke-width="1" marker-end="url(#a)"/><text x="135" y="265" font-size="7" fill="#2e7d32">3.返回waited_events</text>
<rect x="15" y="283" width="90" height="36" rx="3" fill="#fff3e0" stroke="#e65100" stroke-width="0.8"/><text x="60" y="298" text-anchor="middle" font-size="7" fill="#e65100">检查结果</text><text x="60" y="312" text-anchor="middle" font-size="6" fill="#555">可读/超时/错误</text>
<rect x="15" y="335" width="430" height="40" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
<text x="230" y="352" text-anchor="middle" font-size="8" fill="#555">对协程来说UThreadRead()"看起来像阻塞调用"</text>
<text x="230" y="367" text-anchor="middle" font-size="8" fill="#555">实际是Yield→epoll_wait→Resume的异步过程</text>
</svg>
