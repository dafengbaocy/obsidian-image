<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 500">
<style>text{font-family:"WenQuanYi Zen Hei","DejaVu Sans",sans-serif}</style>
<defs><marker id="a" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#555"/></marker></defs>

<rect x="10" y="190" width="95" height="44" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/><text x="57" y="212" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">RPC Client</text><text x="57" y="227" text-anchor="middle" font-size="7" fill="#666">HTTP+Protobuf</text>
<line x1="105" y1="212" x2="148" y2="140" stroke="#1565c0" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="152" y="110" width="130" height="44" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/><text x="217" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">Acceptor</text><text x="217" y="146" text-anchor="middle" font-size="7" fill="#666">accept·round-robin</text>
<rect x="152" y="160" width="130" height="20" rx="4" fill="#ffebee" stroke="#c62828" stroke-width="1" stroke-dasharray="3,2"/><text x="217" y="174" text-anchor="middle" font-size="8" fill="#c62828">CanAccept()检查</text>
<line x1="217" y1="154" x2="217" y2="160" stroke="#c62828" stroke-width="0.8"/>
<line x1="282" y1="132" x2="322" y2="132" stroke="#e65100" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="326" y="40" width="440" height="440" rx="8" fill="rgba(46,125,50,0.03)" stroke="#2e7d32" stroke-width="1" stroke-dasharray="6,3"/><text x="340" y="55" font-size="9" font-weight="bold" fill="#2e7d32">HshaServerUnit[idx]</text>
<rect x="345" y="70" width="200" height="95" rx="5" fill="#e8eaf6" stroke="#283593" stroke-width="1.5"/><text x="445" y="88" text-anchor="middle" font-size="10" font-weight="bold" fill="#283593">HshaServerIO</text><text x="445" y="104" text-anchor="middle" font-size="8" fill="#555">IO线程(epoll+ucontext)</text><text x="445" y="118" text-anchor="middle" font-size="8" fill="#555">IOFunc:RecvRequest→PushReq</text><text x="445" y="132" text-anchor="middle" font-size="8" fill="#555">ActiveSocket:PluckResp→Send</text><text x="445" y="150" text-anchor="middle" font-size="7" fill="#888">1 epoll→100K+ sockets</text>
<rect x="345" y="172" width="200" height="20" rx="4" fill="#ffebee" stroke="#c62828" stroke-width="1" stroke-dasharray="3,2"/><text x="445" y="186" text-anchor="middle" font-size="8" fill="#c62828">CanEnqueue()快速拒绝</text><line x1="445" y1="165" x2="445" y2="172" stroke="#c62828" stroke-width="0.8"/>
<rect x="345" y="208" width="200" height="100" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/><text x="445" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">DataFlow</text><text x="445" y="246" text-anchor="middle" font-size="8" fill="#555">in_queue_ ThdQueue&lt;Req&gt;</text><text x="445" y="262" text-anchor="middle" font-size="8" fill="#555">out_queue_ ThdQueue&lt;Resp&gt;</text><text x="445" y="282" text-anchor="middle" font-size="7" fill="#888">mutex+condition_variable</text><text x="445" y="298" text-anchor="middle" font-size="7" fill="#888">QueueExtData:入队时间+socket*</text>
<line x1="445" y1="192" x2="445" y2="206" stroke="#e65100" stroke-width="0.8" marker-end="url(#a)"/><text x="455" y="198" font-size="6" fill="#e65100">Push</text>
<line x1="445" y1="308" x2="445" y2="322" stroke="#2e7d32" stroke-width="1" marker-end="url(#a)"/>
<rect x="345" y="326" width="200" height="75" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/><text x="445" y="348" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">WorkerPool+Worker[]</text><text x="445" y="366" text-anchor="middle" font-size="8" fill="#555">Thread:PluckRequest(阻塞)</text><text x="445" y="382" text-anchor="middle" font-size="8" fill="#555">UThread:PickRequest(非阻塞)</text><text x="445" y="396" text-anchor="middle" font-size="7" fill="#888">dispatch_(req,resp)→业务代码</text>
<rect x="590" y="208" width="130" height="80" rx="5" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.2"/><text x="655" y="228" text-anchor="middle" font-size="9" font-weight="bold" fill="#7b1fa2">HshaServerStat</text><text x="655" y="245" text-anchor="middle" font-size="7" fill="#555">33个atomic计数器</text><text x="655" y="260" text-anchor="middle" font-size="7" fill="#555">accept_qps·rpc_cost</text><text x="655" y="278" text-anchor="middle" font-size="7" fill="#555">queue_wait_avg</text>
<rect x="590" y="310" width="130" height="78" rx="5" fill="#ffebee" stroke="#c62828" stroke-width="1.2"/><text x="655" y="330" text-anchor="middle" font-size="9" font-weight="bold" fill="#c62828">HshaServerQos</text><text x="655" y="347" text-anchor="middle" font-size="7" fill="#555">自适应过载控制</text><text x="655" y="363" text-anchor="middle" font-size="7" fill="#555">if wait&gt;threshold:</text><text x="655" y="379" text-anchor="middle" font-size="7" fill="#555">  reject+=adjust</text>
<line x1="655" y1="288" x2="655" y2="308" stroke="#c62828" stroke-width="0.8" stroke-dasharray="3,2"/>
<path d="M 445 401 L 445 460 Q 445 475 425 475 L 210 475 Q 190 475 190 455 L 190 250" fill="none" stroke="#2e7d32" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#a)"/>
<text x="315" y="470" font-size="7" fill="#2e7d32">响应:out_queue→IO→write→Client</text>
<text x="600" y="75" font-size="9" font-weight="bold" fill="#333">图例</text>
<rect x="600" y="82" width="12" height="8" rx="2" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/><text x="618" y="90" font-size="7" fill="#555">IO/网络层</text>
<rect x="600" y="96" width="12" height="8" rx="2" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/><text x="618" y="104" font-size="7" fill="#555">Worker/业务</text>
<rect x="600" y="110" width="12" height="8" rx="2" fill="#fff3e0" stroke="#e65100" stroke-width="1"/><text x="618" y="118" font-size="7" fill="#555">队列/DataFlow</text>
<rect x="600" y="124" width="12" height="8" rx="2" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/><text x="618" y="132" font-size="7" fill="#555">监控</text>
<rect x="600" y="138" width="12" height="8" rx="2" fill="#ffebee" stroke="#c62828" stroke-width="1"/><text x="618" y="146" font-size="7" fill="#555">QoS/过载</text>

</svg>