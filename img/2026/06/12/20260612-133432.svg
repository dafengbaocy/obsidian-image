<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 250">
<style>text{font-family:"WenQuanYi Zen Hei","DejaVu Sans",sans-serif}</style>
<defs><marker id="a" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#555"/></marker></defs>

<text x="280" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">HshaServerQos 自适应拒绝算法</text>
<rect x="30" y="30" width="130" height="28" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/><text x="95" y="49" text-anchor="middle" font-size="9" fill="#1565c0">每秒执行CalFunc()</text>
<line x1="95" y1="58" x2="95" y2="73" stroke="#555" stroke-width="1" marker-end="url(#a)"/>
<polygon points="95,77 200,110 95,143 -10,110" fill="#fff3e0" stroke="#e65100" stroke-width="1"/><text x="95" y="107" text-anchor="middle" font-size="8" fill="#e65100">avg_queue_wait</text><text x="95" y="119" text-anchor="middle" font-size="8" fill="#e65100">更新了?</text>
<line x1="-10" y1="110" x2="-45" y2="110" stroke="#888" stroke-width="0.8"/><text x="-45" y="107" text-anchor="middle" font-size="7" fill="#888">No(skip)</text>
<line x1="95" y1="143" x2="95" y2="160" stroke="#2e7d32" stroke-width="1" marker-end="url(#a)"/><text x="108" y="156" font-size="8" fill="#2e7d32">Yes</text>
<polygon points="95,163 200,190 95,217 -10,190" fill="#ffebee" stroke="#c62828" stroke-width="1"/><text x="95" y="187" text-anchor="middle" font-size="8" fill="#c62828">avg_wait &gt;</text><text x="95" y="200" text-anchor="middle" font-size="8" fill="#c62828">threshold(20ms)?</text>
<line x1="-10" y1="190" x2="-45" y2="190" stroke="#c62828" stroke-width="1" marker-end="url(#a)"/><text x="-32" y="185" font-size="7" fill="#c62828">Yes</text>
<rect x="200" y="170" width="130" height="40" rx="4" fill="#ffebee" stroke="#c62828" stroke-width="0.8"/><text x="265" y="187" text-anchor="middle" font-size="9" fill="#c62828">reject_rate+=adjust</text><text x="265" y="203" text-anchor="middle" font-size="7" fill="#888">上限99%</text>
<line x1="95" y1="217" x2="95" y2="234" stroke="#2e7d32" stroke-width="1" marker-end="url(#a)"/><text x="108" y="232" font-size="8" fill="#2e7d32">No(正常)</text>
<rect x="330" y="224" width="130" height="28" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.8"/><text x="395" y="243" text-anchor="middle" font-size="9" fill="#2e7d32">reject_rate-=adjust</text>
<rect x="300" y="88" width="180" height="26" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/><text x="390" y="99" text-anchor="middle" font-size="7" fill="#555">CanEnqueue:rand()%100>=rate?</text><text x="390" y="111" text-anchor="middle" font-size="7" fill="#555">例:rate=30->30%概率拒绝</text>

</svg>