<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340">
<style>text{font-family:"WenQuanYi Zen Hei","DejaVu Sans",sans-serif}</style>
<defs><marker id="a" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#555"/></marker></defs>

<text x="320" y="14" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Backup Requests — 同时向两台Server发请求,谁先返回用谁</text>
<rect x="10" y="26" width="90" height="20" rx="3" fill="#e3f2fd" stroke="#1565c0"/><text x="55" y="40" text-anchor="middle" font-size="8" fill="#1565c0">Client</text><line x1="55" y1="46" x2="55" y2="320" stroke="#ccc" stroke-dasharray="3,3"/>
<rect x="140" y="26" width="105" height="20" rx="3" fill="#ede7f6" stroke="#4527a0"/><text x="192" y="40" text-anchor="middle" font-size="8" fill="#4527a0">Scheduler</text><line x1="192" y1="46" x2="192" y2="320" stroke="#ccc" stroke-dasharray="3,3"/>
<rect x="285" y="26" width="90" height="20" rx="3" fill="#e8f5e9" stroke="#2e7d32"/><text x="330" y="40" text-anchor="middle" font-size="8" fill="#2e7d32">Server A</text><line x1="330" y1="46" x2="330" y2="320" stroke="#ccc" stroke-dasharray="3,3"/>
<rect x="420" y="26" width="90" height="20" rx="3" fill="#e8f5e9" stroke="#2e7d32"/><text x="465" y="40" text-anchor="middle" font-size="8" fill="#2e7d32">Server B</text><line x1="465" y1="46" x2="465" y2="320" stroke="#ccc" stroke-dasharray="3,3"/>
<rect x="550" y="26" width="55" height="20" rx="3" fill="#fff3e0" stroke="#e65100"/><text x="577" y="40" text-anchor="middle" font-size="8" fill="#e65100">ret</text><line x1="577" y1="46" x2="577" y2="320" stroke="#ccc" stroke-dasharray="3,3"/>
<text x="65" y="68" font-size="7" fill="#1565c0">uthread_begin</text>
<line x1="55" y1="78" x2="189" y2="78" stroke="#1565c0" stroke-width="0.8"/><text x="120" y="73" font-size="7" fill="#555">uthread_t x2</text>
<rect x="150" y="88" width="85" height="16" rx="3" fill="#ede7f6" stroke="#4527a0" stroke-width="0.5"/><text x="192" y="100" text-anchor="middle" font-size="6" fill="#4527a0">AddTask→todo</text>
<line x1="55" y1="112" x2="189" y2="112" stroke="#1565c0" stroke-width="0.8"/><text x="120" y="108" font-size="7" fill="#555">uthread_end→Run</text>
<line x1="192" y1="126" x2="327" y2="142" stroke="#2e7d32" stroke-width="0.8"/><text x="260" y="134" font-size="7" fill="#2e7d32">协程1:connect+send A</text>
<line x1="192" y1="142" x2="462" y2="158" stroke="#2e7d32" stroke-width="0.8"/><text x="325" y="152" font-size="7" fill="#2e7d32">协程2:connect+send B</text>
<rect x="285" y="152" width="90" height="16" rx="3" fill="#ffebee" stroke="#c62828" stroke-width="0.5"/><text x="330" y="164" text-anchor="middle" font-size="7" fill="#c62828">Yield(等响应)</text>
<rect x="420" y="168" width="90" height="16" rx="3" fill="#ffebee" stroke="#c62828" stroke-width="0.5"/><text x="465" y="180" text-anchor="middle" font-size="7" fill="#c62828">Yield(等响应)</text>
<line x1="465" y1="192" x2="195" y2="208" stroke="#c62828" stroke-width="0.8" stroke-dasharray="3,2"/><text x="330" y="204" font-size="7" fill="#c62828">epoll:B先响应!</text>
<rect x="195" y="214" width="80" height="36" rx="3" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.5"/><text x="235" y="229" text-anchor="middle" font-size="7" fill="#2e7d32">Resume协程2</text><text x="235" y="244" text-anchor="middle" font-size="7" fill="#555">stub.Echo()返回</text>
<line x1="235" y1="262" x2="574" y2="262" stroke="#e65100" stroke-width="0.8"/><text x="400" y="258" font-size="7" fill="#e65100">ret=0</text>
<rect x="195" y="274" width="80" height="16" rx="3" fill="#ffebee" stroke="#c62828" stroke-width="0.5"/><text x="235" y="286" text-anchor="middle" font-size="7" fill="#c62828">Close()终止协程1</text>
<rect x="10" y="305" width="620" height="24" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
<text x="320" y="322" text-anchor="middle" font-size="8" fill="#555">总延迟=min(ServerA,ServerB)≈5ms,不是A+B=20ms.代码同步写法,实际epoll+Yield并发</text>

</svg>